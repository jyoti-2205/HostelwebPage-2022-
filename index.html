<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cauvery Bhawan - NIT Kurukshetra</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e8f5e9;
}

/* HEADER */
.head {
    background:#0b397a;
    color:white;
    padding:20px;
    text-align:center;
}

.head h1, .head h3 {
    margin: 5px;
}

.head button{
    background:white;
    color:#0b397a;
    padding:8px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* HERO IMAGE */
.logos {
    height: 250px;
    background: url("https://images.unsplash.com/photo-1560448204-e02f11c3d0e2") no-repeat center/cover;
}

/* COMMON CARD STYLE */
.card {
    background:white;
    margin:20px auto;
    width:90%;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2 {
    border-bottom:3px solid #0a5ed7;
    padding-bottom:5px;
}

/* LIST */
ul {
    padding-left:20px;
}

/* FORM */
input, textarea, select {
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

button {
    background:#0a5ed7;
    color:white;
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* IMAGE */
img {
    max-width:100%;
    border-radius:10px;
}

/* FOOTER */
footer {
    background:#0a5ed7;
    color:white;
    text-align:center;
    padding:10px;
}

/* MOBILE FIX */
@media (max-width:600px) {
    .logos {
        height:180px;
    }
}

</style>
</head>

<body>

<div class="logos"></div>

<div class="head">
    <h1>Cauvery Bhawan</h1>
    <h3>Girls Hostel</h3>
    <button>Sign-up</button>
</div>

<div class="card">
    <h2>Facilities</h2>
    <ul>
        <li>24×7 Water Supply</li>
        <li>Wi-Fi</li>
        <li>Mess Facility</li>
        <li>Security</li>
    </ul>
</div>

<div class="card">
    <h2>Room Capacity</h2>
    <select>
        <option>Single</option>
        <option>Double</option>
        <option>Triple</option>
    </select>
</div>

<div class="card">
    <h2>Hostel Image</h2>
    <img src="https://images.unsplash.com/photo-1598928506311-c55ded91a20c">
</div>

<div class="card">
    <h2>Google Map</h2>
    <iframe 
    src="https://www.google.com/maps?q=NIT%20Kurukshetra&output=embed"
    width="100%" height="300" style="border:0;">
    </iframe>
</div>

<div class="card">
    <h2>Registration Form</h2>

    <input type="text" placeholder="Name">
    <input type="text" placeholder="Roll Number">
    <input type="email" placeholder="Email">
    <input type="tel" placeholder="Phone">

    <label>Leave Reason</label>
    <textarea placeholder="Enter reason"></textarea>

    <button>Submit</button>
</div>

<footer>
© 2026 Cauvery Bhawan
</footer>

</body>
</html>
